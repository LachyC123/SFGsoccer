<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Neon Nexus: Solo Arena</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="splash" class="screen active">
      <div class="logo-wrap">
        <div class="logo-badge">NX</div>
        <h1>NEON NEXUS</h1>
        <p>Solo Arena</p>
      </div>
    </div>

    <div id="menu" class="screen">
      <div class="menu-bg"></div>
      <header class="top-bar safe-top">
        <div class="currency"><span>🪙</span><b id="coins">120</b></div>
        <div class="currency"><span>💎</span><b id="gems">8</b></div>
        <div class="currency"><span>🏆</span><b id="trophies">50</b></div>
      </header>

      <section class="hero-stage">
        <div class="hero-glow"></div>
        <div class="hero-card">
          <div class="hero-avatar"></div>
          <div class="hero-name">VEXA · STORMCASTER</div>
        </div>
      </section>

      <section class="mode-panel">
        <div class="mode-title">SOLO SHOWDOWN · VOLTAIC RUINS</div>
        <button id="playBtn" class="play-btn">PLAY</button>
      </section>

      <nav class="bottom-nav safe-bottom">
        <button class="nav-btn">Shop</button>
        <button class="nav-btn">Heroes</button>
        <button class="nav-btn">Modes</button>
        <button class="nav-btn">Events</button>
        <button class="nav-btn">Settings</button>
      </nav>
    </div>

    <div id="transition" class="screen">
      <div class="vs-wrap">
        <h2>MATCHMAKING</h2>
        <p>Deploying into Voltaic Ruins...</p>
        <div class="loading-bar"><span id="loadingFill"></span></div>
      </div>
    </div>

    <div id="game" class="screen">
      <canvas id="gameCanvas" width="540" height="960"></canvas>
      <div class="hud safe-top">
        <div class="hud-pill">Alive: <b id="aliveCount">0</b></div>
        <div class="hud-pill">Time: <b id="timeCount">0</b>s</div>
        <div class="hud-pill">Power: <b id="powerCount">0</b></div>
      </div>

      <div class="health-frame">
        <div id="playerHealth" class="health"></div>
      </div>

      <div class="zone-warning" id="zoneWarning">ZONE CLOSING</div>

      <div class="controls safe-bottom">
        <div id="movePad" class="pad left">
          <div id="moveStick" class="stick"></div>
        </div>
        <div class="right-controls">
          <div id="attackPad" class="pad attack">
            <div id="attackStick" class="stick"></div>
          </div>
          <button id="superBtn" class="super-btn">SUPER</button>
        </div>
      </div>
    </div>

    <div id="results" class="screen">
      <div class="result-card">
        <h2 id="resultTitle">VICTORY</h2>
        <div class="result-hero"></div>
        <div class="rewards">
          <div class="reward">Rank <b id="rankTxt">#1</b></div>
          <div class="reward">Trophies <b id="trophyDelta">+8</b></div>
          <div class="reward">Coins <b id="coinDelta">+24</b></div>
        </div>
        <div class="result-actions">
          <button id="againBtn" class="play-btn">PLAY AGAIN</button>
          <button id="homeBtn" class="nav-btn home">HOME</button>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
